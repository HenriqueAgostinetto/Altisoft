# Henrique Agostinetto Piva
services:
  postgres:
    image: postgres:16
    container_name: altisoft-postgres
    environment:
      POSTGRES_DB: altisoft
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - altisoft_pgdata:/var/lib/postgresql/data

volumes:
  altisoft_pgdata:
